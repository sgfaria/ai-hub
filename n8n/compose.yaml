services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:${N8N_VERSION:-latest}
    container_name: n8n
    restart: unless-stopped

    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      GENERIC_TIMEZONE: ${TZ:-America/Sao_Paulo}
      N8N_HOST: ${N8N_HOST:?defina o hostname público do n8n}
      N8N_PROTOCOL: https
      N8N_PORT: "5678"
      WEBHOOK_URL: https://${N8N_HOST}/
      N8N_PROXY_HOPS: "1"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?defina uma chave longa e imutável}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${DB_POSTGRESDB_DATABASE:-n8n}
      DB_POSTGRESDB_USER: ${DB_POSTGRESDB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${DB_POSTGRESDB_PASSWORD:?use a senha da Stack postgres}

    volumes:
      - ${AI_HUB_ROOT:-/srv/ai-hub}/n8n/data:/home/node/.n8n

    expose:
      - "5678"

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5678/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "5"

    networks:
      - ai-network

networks:
  ai-network:
    external: true
    name: ${AI_HUB_NETWORK:-ai-network}
