services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-17-alpine}
    container_name: postgres
    restart: unless-stopped

    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no Portainer}

    volumes:
      - ${AI_HUB_ROOT:-/srv/ai-hub}/postgres/data:/var/lib/postgresql/data

    expose:
      - "5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "5"

    networks:
      - ai-network

networks:
  ai-network:
    external: true
    name: ${AI_HUB_NETWORK:-ai-network}
