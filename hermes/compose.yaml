services:
  hermes-agent:
    image: nousresearch/hermes-agent:${HERMES_VERSION:-latest}
    container_name: hermes-agent
    hostname: hermes-agent
    command: ["gateway", "run"]
    restart: unless-stopped
    init: true
    shm_size: 1gb

    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: "8642"
      API_SERVER_KEY: ${API_SERVER_KEY:?defina API_SERVER_KEY no Portainer}
      HERMES_DASHBOARD: ${HERMES_DASHBOARD:-1}
      HERMES_DASHBOARD_HOST: 0.0.0.0
      HERMES_DASHBOARD_PORT: "9119"
      HERMES_DASHBOARD_BASIC_AUTH_USERNAME: ${HERMES_DASHBOARD_BASIC_AUTH_USERNAME:?defina o usuário do dashboard}
      HERMES_DASHBOARD_BASIC_AUTH_PASSWORD: ${HERMES_DASHBOARD_BASIC_AUTH_PASSWORD:?defina a senha do dashboard}
      HERMES_DASHBOARD_BASIC_AUTH_SECRET: ${HERMES_DASHBOARD_BASIC_AUTH_SECRET:?defina um segredo de sessão longo}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?defina OPENAI_API_KEY no Portainer}

    volumes:
      - ${AI_HUB_ROOT:-/srv/ai-hub}/hermes/data:/opt/data
      - ${AI_HUB_ROOT:-/srv/ai-hub}/hermes/workspace:/workspace

    expose:
      - "8642"
      - "9119"

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8642/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "5"

    networks:
      - ai-network

networks:
  ai-network:
    external: true
    name: ${AI_HUB_NETWORK:-ai-network}
