services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:${OPENWEBUI_VERSION:-main}
    container_name: open-webui
    restart: unless-stopped

    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      OPENAI_API_BASE_URL: http://hermes-agent:8642/v1
      OPENAI_API_KEY: ${API_SERVER_KEY:?use a mesma API_SERVER_KEY do Hermes}
      ENABLE_OLLAMA_API: ${ENABLE_OLLAMA_API:-false}

    volumes:
      - ${AI_HUB_ROOT:-/srv/ai-hub}/openwebui/data:/app/backend/data

    expose:
      - "8080"

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "5"

    networks:
      - ai-network

networks:
  ai-network:
    external: true
    name: ${AI_HUB_NETWORK:-ai-network}
